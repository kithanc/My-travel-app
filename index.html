<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>關西隨身旅伴 | Kansai 2026</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
    <style>
        /* 大地色系變數定義 */
        :root {
            --earth-bg: #F2EDE4;      /* 暖米色背景 */
            --earth-card: #FAF9F6;    /* 淺色和紙卡片 */
            --earth-brown: #7E6363;   /* 乾枯玫瑰棕 */
            --earth-deep: #5D5245;    /* 深焙茶色文字 */
            --earth-accent: #A8907E;  /* 亞麻棕強調色 */
        }
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: var(--earth-bg); 
            color: var(--earth-deep); 
            letter-spacing: 0.02em;
        }
        h1 { font-family: 'Noto Serif TC', serif; color: var(--earth-deep); }
        .card { 
            background: var(--earth-card); 
            border-radius: 18px; 
            border: 1px solid #E3D9C6;
            box-shadow: 0 4px 12px rgba(93, 82, 69, 0.05);
        }
        .nav-shadow { box-shadow: 0 -4px 20px rgba(93, 82, 69, 0.08); }
        .btn-active { color: var(--earth-brown); transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-24 relative shadow-inner">
        
        <header class="p-7 pt-10">
            <h1 class="text-2xl font-medium tracking-tight">關西の旅 2026</h1>
            <p class="text-[11px] opacity-60 mt-1 tracking-[0.2em] uppercase font-light">Osaka · Kyoto · Nara · Kobe</p>
        </header>

        <main class="px-5 space-y-6">
            
            <section v-if="activeTab === 'itinerary'">
                <div class="card p-5 mb-5 flex items-center justify-between border-l-4 border-l-[#A8907E]">
                    <div>
                        <p class="text-[10px] text-stone-400 uppercase tracking-widest mb-1">Forecast · Kyoto</p>
                        <p class="text-lg font-medium text-stone-700">14°C 晴時多雲</p>
                    </div>
                    <div class="text-3xl opacity-80">🌤️</div>
                </div>

                <h2 class="text-sm font-medium mb-4 pl-1 flex items-center gap-2">
                    <span class="w-1 h-4 bg-[#7E6363] rounded-full"></span>
                    今日行程規劃
                </h2>
                <div class="space-y-4">
                    <div v-for="item in schedule" :key="item.time" class="card p-5 transition-all active:bg-stone-50">
                        <div class="flex gap-4">
                            <span class="text-[11px] font-mono font-bold text-[#A8907E] pt-1">{{ item.time }}</span>
                            <div>
                                <h3 class="font-medium text-stone-800 leading-snug">{{ item.title }}</h3>
                                <p class="text-xs text-stone-500 mt-2 leading-relaxed">{{ item.desc }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="card aspect-[4/5] w-full flex items-center justify-center bg-[#E8E2D6] relative overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')] opacity-30"></div>
                    <p class="text-stone-500 italic font-light">關西地區路線預覽</p>
                </div>
                <div class="card p-5">
                    <h3 class="text-sm font-medium mb-3">重點地標</h3>
                    <ul class="text-sm space-y-3 opacity-80">
                        <li class="flex items-center gap-2">🏮 清水寺 (Kyoto)</li>
                        <li class="flex items-center gap-2">🎡 道頓堀 (Osaka)</li>
                        <li class="flex items-center gap-2">🦌 奈良
